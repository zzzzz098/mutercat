<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>floating-hearts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 25%, #fbc2eb 50%, #f6d5f7 75%, #ffd1dc 100%);
    position: relative;
  }

  .heart {
    position: absolute;
    font-size: 24px;
    animation: floatDown linear infinite;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  .text-float {
    position: absolute;
    animation: floatDownSlow linear infinite;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255, 130, 160, 0.5);
  }

  @keyframes floatDown {
    0%   { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.9; }
    95%  { opacity: 0.9; }
    100% { transform: translateY(105vh) scale(1.2) rotate(360deg); opacity: 0; }
  }

  @keyframes floatDownSlow {
    0%   { transform: translateY(0) scale(0.6); opacity: 0; }
    8%   { opacity: 0.95; }
    92%  { opacity: 0.95; }
    100% { transform: translateY(105vh) scale(1.05); opacity: 0; }
  }
</style>
</head>
<body>

<script>
const EMOJIS = ['❤️', '💕', '💖', '💗', '💝', '💘', '💓', '🩷', '♥️', '💞'];
const TEXTS = ['小妞要天天开心哦', '小妞美美的'];
const PINK_COLORS = [
  '#ff6b8a', '#ff85a1', '#ff98b5', '#ffaac8',
  '#ff7eb3', '#ff5c8a', '#f779a6', '#ff95b8',
  '#ff6b9d', '#ff88a8', '#ff9eb5', '#ffb8c9',
];
const HEART_COUNT = 60;
const TEXT_COUNT = 25;

function random(min, max) {
  return Math.random() * (max - min) + min;
}

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ---- 爱心 ----
function createHeart() {
  const el = document.createElement('span');
  el.className = 'heart';
  el.textContent = randomItem(EMOJIS);

  const size = random(14, 42);
  el.style.fontSize = size + 'px';
  el.style.left = random(0, 100) + '%';
  el.style.top = -(size + random(10, 60)) + 'px';

  const duration = random(3, 7);
  el.style.animationDuration = duration + 's';
  el.style.animationDelay = random(0, 6) + 's';

  document.body.appendChild(el);

  const lifetime = (duration + random(3, 5)) * 1000;
  setTimeout(() => {
    el.remove();
    createHeart();
  }, lifetime);
}

// ---- 文字：粉色、慢速、大小不一 ----
function createTextFloater() {
  const el = document.createElement('span');
  el.className = 'text-float';
  el.textContent = randomItem(TEXTS);
  el.style.color = randomItem(PINK_COLORS);

  // 字体大小：有的很大(36~64px)，有的中等(18~35px)
  const size = Math.random() < 0.45
    ? random(36, 64)   // 45% 概率大字
    : random(18, 35);  // 55% 概率中小字
  el.style.fontSize = size + 'px';
  el.style.left = random(0, 95) + '%';
  el.style.top = -(size + random(20, 100)) + 'px';

  // 慢速下落：8~18秒
  const duration = random(8, 18);
  el.style.animationDuration = duration + 's';
  el.style.animationDelay = random(0, 10) + 's';

  document.body.appendChild(el);

  const lifetime = (duration + random(3, 6)) * 1000;
  setTimeout(() => {
    el.remove();
    createTextFloater();
  }, lifetime);
}

// ---- 启动 ----
for (let i = 0; i < HEART_COUNT; i++) {
  setTimeout(() => createHeart(), random(0, 2000));
}

for (let i = 0; i < TEXT_COUNT; i++) {
  setTimeout(() => createTextFloater(), random(0, 3000));
}
</script>

</body>
</html>
